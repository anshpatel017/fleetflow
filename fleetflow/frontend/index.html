<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FleetFlow — Fleet & Logistics Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.style.background = '#0D1420';
        document.body.innerHTML = '<pre style="color:#EF4444;padding:32px;white-space:pre-wrap;font-family:monospace;font-size:14px">' +
          e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.style.background = '#0D1420';
        document.body.innerHTML = '<pre style="color:#EF4444;padding:32px;white-space:pre-wrap;font-family:monospace;font-size:14px">Unhandled Promise Rejection:\n' +
          (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
